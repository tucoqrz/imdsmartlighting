services:
  mongo-db: 
    image: mongo:4.4 
    networks:
      - fiware_network
    container_name: mongo-db 
    ports: 
      - "27017:27017" 
      
  orion: 
    image: fiware/orion 
    networks:
      - fiware_network
    container_name: orion
    depends_on: 
      - mongo-db 
    ports: 
      - "1026:1026" 
    command: -dbURI mongodb://mongo-db:27017/orion 
    
  iot-agent:
    image: fiware/iotagent-json
    networks:
      - fiware_network
    hostname: iot-agent
    container_name: fiware-iot-agent
    depends_on:
        - mongo-db
    expose:
        - "4041"
        - "7896"
    ports:
        - "4041:4041"
        - "7896:7896"
    environment:
        - "IOTA_CB_HOST=orion"
        - "IOTA_CB_PORT=1026"
        - "IOTA_NORTH_PORT=4041"
        - "IOTA_REGISTRY_TYPE=mongo-db"
        - "IOTA_MONGO_HOST=mongo-db"
        - "IOTA_MONGO_PORT=27017"
        - "IOTA_MONGO_DB=iotagent-json"
        - "IOTA_HTTP_PORT=7896"
        - "IOTA_PROVIDER_URL=http://iot-agent:4041"

  cratedb:
    image: crate:4.6.1
    container_name: db-crate
    hostname: cratedb
    networks:
      - fiware_network
    ports:
      - "4200:4200"
      - "4300:4300"
      - "5432:5432"

  quantumleap:
    image: fiware/quantum-leap:latest
    container_name: fiware-quantumleap
    hostname: quantumleap
    depends_on:
      - cratedb
    networks:
      - fiware_network
    ports:
      - "8668:8668"
    environment:
      - CRATE_HOST=cratedb

  grafana:
    image: grafana/grafana:9.5.2
    container_name: fiware-grafana
    depends_on:
      - cratedb
    networks:
      - fiware_network
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  fiware-populate:
    image: python:3.9-slim
    container_name: fiware-populate
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - fiware_network
    depends_on:
      - iot-agent
      - orion
    command: >
      sh -c "pip install requests && tail -f /dev/null"

networks:
  fiware_network:
    driver: bridge

volumes:
  mongo_data: